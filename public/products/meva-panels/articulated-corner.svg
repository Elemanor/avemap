<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#f5f5f4"/>
  <rect x="40" y="40" width="320" height="320" rx="16" fill="#e7e5e4" stroke="#d6d3d1" stroke-width="2"/>
  <!-- Articulated corner: L-shape with hinge -->
  <g transform="translate(80,70)">
    <!-- Left panel (angled) -->
    <g transform="rotate(-15, 30, 200)">
      <rect x="0" y="0" width="60" height="220" rx="4" fill="#f59e0b" opacity="0.85"/>
      <rect x="4" y="4" width="52" height="212" rx="2" fill="#fbbf24" opacity="0.5"/>
      <circle cx="30" cy="25" r="5" fill="#b45309"/>
      <circle cx="30" cy="65" r="5" fill="#b45309"/>
      <circle cx="30" cy="105" r="5" fill="#b45309"/>
      <circle cx="30" cy="145" r="5" fill="#b45309"/>
    </g>
    <!-- Right panel (angled other way) -->
    <g transform="rotate(15, 210, 200)">
      <rect x="180" y="0" width="60" height="220" rx="4" fill="#f59e0b" opacity="0.85"/>
      <rect x="184" y="4" width="52" height="212" rx="2" fill="#fbbf24" opacity="0.5"/>
      <circle cx="210" cy="25" r="5" fill="#b45309"/>
      <circle cx="210" cy="65" r="5" fill="#b45309"/>
      <circle cx="210" cy="105" r="5" fill="#b45309"/>
      <circle cx="210" cy="145" r="5" fill="#b45309"/>
    </g>
    <!-- Hinge point -->
    <circle cx="120" cy="200" r="14" fill="#b45309" opacity="0.9"/>
    <circle cx="120" cy="200" r="8" fill="#fbbf24"/>
    <circle cx="120" cy="200" r="3" fill="#b45309"/>
    <!-- Angle arc -->
    <path d="M90,165 Q120,140 150,165" fill="none" stroke="#b45309" stroke-width="2" stroke-dasharray="4,3"/>
    <!-- Double-headed arrow for adjustable angle -->
    <path d="M85,160 L90,165 L84,168" fill="none" stroke="#b45309" stroke-width="2"/>
    <path d="M155,160 L150,165 L156,168" fill="none" stroke="#b45309" stroke-width="2"/>
  </g>
  <text x="200" y="365" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="600" fill="#57534e">Articulated Corner</text>
</svg>