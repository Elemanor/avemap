<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#f5f5f4"/>
  <rect x="40" y="40" width="320" height="320" rx="16" fill="#e7e5e4" stroke="#d6d3d1" stroke-width="2"/>
  <!-- Inside corner: inverted L-shape -->
  <g transform="translate(80,80)">
    <!-- Vertical arm (right side) -->
    <rect x="180" y="0" width="60" height="240" rx="4" fill="#8b5cf6" opacity="0.85"/>
    <rect x="184" y="4" width="52" height="232" rx="2" fill="#a78bfa" opacity="0.5"/>
    <!-- Horizontal arm (bottom, extending left) -->
    <rect x="0" y="180" width="240" height="60" rx="4" fill="#8b5cf6" opacity="0.85"/>
    <rect x="4" y="184" width="232" height="52" rx="2" fill="#a78bfa" opacity="0.5"/>
    <!-- Connection dots -->
    <circle cx="210" cy="20" r="6" fill="#6d28d9"/>
    <circle cx="210" cy="60" r="6" fill="#6d28d9"/>
    <circle cx="210" cy="100" r="6" fill="#6d28d9"/>
    <circle cx="210" cy="140" r="6" fill="#6d28d9"/>
    <circle cx="20" cy="210" r="6" fill="#6d28d9"/>
    <circle cx="60" cy="210" r="6" fill="#6d28d9"/>
    <circle cx="100" cy="210" r="6" fill="#6d28d9"/>
    <circle cx="140" cy="210" r="6" fill="#6d28d9"/>
    <!-- 90° angle indicator (inside) -->
    <path d="M180,180 L155,180 L155,155" fill="none" stroke="#6d28d9" stroke-width="2.5" stroke-dasharray="4,3"/>
  </g>
  <text x="200" y="365" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="600" fill="#57534e">Inside Corner</text>
</svg>