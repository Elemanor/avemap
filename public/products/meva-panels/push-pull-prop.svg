<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#f5f5f4"/>
  <rect x="40" y="40" width="320" height="320" rx="16" fill="#e7e5e4" stroke="#d6d3d1" stroke-width="2"/>
  <!-- Push-pull prop: telescoping brace -->
  <g transform="translate(100,70)">
    <!-- Outer tube -->
    <rect x="80" y="0" width="40" height="140" rx="4" fill="#0ea5e9" opacity="0.85"/>
    <rect x="84" y="4" width="32" height="132" rx="2" fill="#38bdf8" opacity="0.5"/>
    <!-- Inner tube (telescoping) -->
    <rect x="86" y="100" width="28" height="160" rx="3" fill="#0284c7" opacity="0.9"/>
    <rect x="90" y="104" width="20" height="152" rx="2" fill="#38bdf8" opacity="0.4"/>
    <!-- Adjustment pin/collar -->
    <rect x="75" y="95" width="50" height="16" rx="3" fill="#0369a1"/>
    <rect x="78" y="98" width="44" height="10" rx="2" fill="#0ea5e9"/>
    <!-- Holes for adjustment -->
    <circle cx="100" cy="130" r="3" fill="#0369a1"/>
    <circle cx="100" cy="150" r="3" fill="#0369a1"/>
    <circle cx="100" cy="170" r="3" fill="#0369a1"/>
    <circle cx="100" cy="190" r="3" fill="#0369a1"/>
    <!-- Top plate (wall attachment) -->
    <rect x="60" y="-5" width="80" height="12" rx="3" fill="#0369a1"/>
    <circle cx="75" cy="1" r="4" fill="#38bdf8"/>
    <circle cx="125" cy="1" r="4" fill="#38bdf8"/>
    <!-- Bottom foot plate -->
    <rect x="70" y="255" width="60" height="10" rx="3" fill="#0369a1"/>
    <rect x="65" y="260" width="70" height="8" rx="2" fill="#0369a1" opacity="0.7"/>
    <!-- Extension arrows -->
    <g transform="translate(145,140)">
      <path d="M0,-20 L0,20" stroke="#0369a1" stroke-width="2" stroke-dasharray="4,3"/>
      <path d="M-4,-15 L0,-20 L4,-15" fill="none" stroke="#0369a1" stroke-width="2"/>
      <path d="M-4,15 L0,20 L4,15" fill="none" stroke="#0369a1" stroke-width="2"/>
    </g>
  </g>
  <text x="200" y="365" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="600" fill="#57534e">Push-Pull Prop</text>
</svg>