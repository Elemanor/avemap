<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <rect width="400" height="400" fill="#f5f5f4"/>
  <rect x="40" y="40" width="320" height="320" rx="16" fill="#e7e5e4" stroke="#d6d3d1" stroke-width="2"/>
  <!-- Stripping corner: L with separation indicator -->
  <g transform="translate(80,80)">
    <!-- Left panel -->
    <rect x="0" y="0" width="55" height="220" rx="4" fill="#10b981" opacity="0.85"/>
    <rect x="4" y="4" width="47" height="212" rx="2" fill="#34d399" opacity="0.5"/>
    <!-- Right panel (slightly separated) -->
    <rect x="65" y="0" width="55" height="220" rx="4" fill="#10b981" opacity="0.85"/>
    <rect x="69" y="4" width="47" height="212" rx="2" fill="#34d399" opacity="0.5"/>
    <!-- Separation arrows -->
    <path d="M52,60 L58,60" stroke="#059669" stroke-width="2.5" marker-end="url(#arrowR)"/>
    <path d="M68,60 L62,60" stroke="#059669" stroke-width="2.5" marker-end="url(#arrowL)"/>
    <path d="M52,110 L58,110" stroke="#059669" stroke-width="2.5"/>
    <path d="M68,110 L62,110" stroke="#059669" stroke-width="2.5"/>
    <path d="M52,160 L58,160" stroke="#059669" stroke-width="2.5"/>
    <path d="M68,160 L62,160" stroke="#059669" stroke-width="2.5"/>
    <!-- Bottom panel -->
    <rect x="0" y="160" width="220" height="55" rx="4" fill="#10b981" opacity="0.85"/>
    <rect x="4" y="164" width="212" height="47" rx="2" fill="#34d399" opacity="0.5"/>
    <!-- Connection dots -->
    <circle cx="27" cy="25" r="5" fill="#047857"/>
    <circle cx="27" cy="75" r="5" fill="#047857"/>
    <circle cx="27" cy="125" r="5" fill="#047857"/>
    <circle cx="140" cy="188" r="5" fill="#047857"/>
    <circle cx="180" cy="188" r="5" fill="#047857"/>
    <!-- Stripping direction indicator -->
    <g transform="translate(150,50)">
      <path d="M0,0 L40,0" stroke="#047857" stroke-width="2.5" stroke-dasharray="6,3"/>
      <path d="M34,-5 L40,0 L34,5" fill="none" stroke="#047857" stroke-width="2.5"/>
      <text x="20" y="-8" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#047857">strip</text>
    </g>
  </g>
  <text x="200" y="365" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="600" fill="#57534e">Stripping Corner</text>
  <defs>
    <marker id="arrowR" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="#059669"/></marker>
    <marker id="arrowL" markerWidth="6" markerHeight="6" refX="1" refY="3" orient="auto"><path d="M6,0 L0,3 L6,6" fill="#059669"/></marker>
  </defs>
</svg>